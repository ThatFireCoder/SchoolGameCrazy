<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SchoolGameCrazy</h1>
    
    <div class="score-container">
        <div>Current Score: <span id="score">0</span></div>
        <div>Best Score: <span id="best-score">0</span></div>
        <h2 id="gameStatus"></h2> 
    </div>

    <button id="startBtn" style="padding: 10px 20px; font-size: 16px; margin-bottom: 10px; cursor: pointer;">START GAME</button>

    <br>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script src="game.js" defer></script>
</body>
</html>
