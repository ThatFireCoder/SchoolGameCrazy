<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>SchoolGameCrazy</h1>
        <div style="text-align: center; margin: 20px;">
    <a href="snake/index.html" style="color: #FFD700; font-size: 20px; font-family: sans-serif; text-decoration: none; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 5px; border: 2px solid #FFD700; display: inline-block;">Play Snake 🐍</a>
</div>
        <div class="score-container">
            <div class="score-box">Score: <span id="score">0</span></div>
            <div class="score-box">Best: <span id="best-score">0</span></div>
        </div>

        <h2 id="gameStatus"></h2> 

        <button id="startBtn">START GAME</button>
        
        <br>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
